<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Viewer for Google Drive</title>
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="128x128" href="icons/icon-128.png">
  <link rel="stylesheet" href="css/style.css">
  <script>
    window._gapiPromise = new Promise(r => { window._gapiResolve = r; });
    window._gisPromise  = new Promise(r => { window._gisResolve  = r; });
  </script>
  <script async defer src="https://apis.google.com/js/api.js"          onload="window._gapiResolve()"></script>
  <script async defer src="https://accounts.google.com/gsi/client"     onload="window._gisResolve()"></script>
  <script type="importmap">
    {
      "imports": {
        "three":          "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
        "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="toolbar">
    <button id="btn-open" class="hidden">
      <img src="https://www.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png" alt="">
      Open File from Google Drive
    </button>
    <button id="btn-open-local" class="hidden">Open File from Computer</button>
    <input type="file" id="file-input" accept=".stl,.obj,.glb,.gltf" class="hidden">
    <button id="btn-measure" class="hidden">Measure</button>
    <a id="btn-download" class="hidden" href="#" download>Download the file</a>
  </div>

  <div id="status">
    <div class="spinner"></div>
    <span id="status-text">Initializing...</span>
  </div>

  <canvas id="canvas"></canvas>

  <div id="info-panel" class="hidden">
    <div><span class="info-label">Size:</span> <span id="info-size"></span></div>
    <div><span class="info-label">Dimensions:</span> <span id="info-dimensions"></span></div>
    <div><span class="info-label">Triangles:</span> <span id="info-triangles"></span></div>
    <div><span class="info-label">Vertices:</span> <span id="info-vertices"></span></div>
  </div>

  <div id="measure-info" class="hidden"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
